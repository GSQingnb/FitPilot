# Prometheus 配置文件 — FitPilot AI 健身助手

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'fitpilot'
    environment: 'production'

rule_files:
  - "alerts/*.yml"

scrape_configs:
  # FitPilot 主应用指标
  - job_name: 'fitpilot-app'
    static_configs:
      - targets: ['echomind:8000']
        labels:
          service: 'fitpilot'
    scrape_interval: 10s
    metrics_path: '/metrics'

  # Prometheus 自监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
