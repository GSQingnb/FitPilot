# FitPilot AI 健身助手 — Docker Compose 完整编排
# 浏览器 → Nginx → Next.js前端 + FastAPI后端
# PostgreSQL + Redis + ChromaDB + Prometheus

services:

  # ── PostgreSQL 业务数据库 ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fitpilot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitpilot}
      POSTGRES_USER: ${POSTGRES_USER:-fitpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitpilot_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitpilot} -d ${POSTGRES_DB:-fitpilot}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - echomind-network

  # ── 数据库初始化（一次性）───────────────────────────────────────────────────
  db-init:
    image: fitpilot-echomind:local
    container_name: fitpilot-db-init
    command:
      - sh
      - -c
      - python -m alembic upgrade head && python -m database.seed
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fitpilot}:${POSTGRES_PASSWORD:-fitpilot_dev_password}@postgres:5432/${POSTGRES_DB:-fitpilot}
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - echomind-network

  # ── Redis 缓存（工作记忆）────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: echomind-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-echomind123}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-echomind123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB 向量数据库 ──────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: echomind-chromadb
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chromadb-data:/chroma/chroma
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Prometheus 监控 ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: echomind-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── FastAPI 后端 ────────────────────────────────────────────────────────────
  echomind:
    image: fitpilot-echomind:local
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: echomind-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-fitpilot}:${POSTGRES_PASSWORD:-fitpilot_dev_password}@postgres:5432/${POSTGRES_DB:-fitpilot}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-fitpilot_jwt_dev_key_change_in_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-echomind123}@redis:6379/0
      - CHROMA_PERSIST_DIRECTORY=/app/data/chroma
      - EVAL_BASELINE_PATH=/app/data/eval/baseline.json
      - AUTH_COOKIE_PATH=${AUTH_COOKIE_PATH:-/api/auth}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-false}
      - AUTH_COOKIE_SAMESITE=${AUTH_COOKIE_SAMESITE:-lax}
      - FRONTEND_ORIGINS=${FRONTEND_ORIGINS:-http://localhost}
    volumes:
      - ./data/chroma:/app/data/chroma
      - ./data/eval:/app/data/eval
      - ./logs:/app/logs
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Next.js 前端 ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    container_name: fitpilot-frontend
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/login || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - echomind-network

  # ── Nginx 统一网关 ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: echomind-nginx
    ports:
      - "80:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      echomind:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - echomind-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ── 网络 ────────────────────────────────────────────────────────────────────
networks:
  echomind-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ── 数据卷 ──────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  chromadb-data:
  prometheus-data:
  nginx-logs:
